<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Intro</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: 'Roboto', sans-serif;
    }
    .intro-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.15); /* 더 밝은 느낌을 위해 어둡기 정도를 낮춤 */
      z-index: 2;
    }
    .enter-btn {
      position: absolute;
      bottom: 40px;
      right: 40px;
      z-index: 3;
      color: white;
      font-size: 1rem;
      font-weight: 300; /* Roboto Light */
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 10px 24px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      transition: all 0.3s ease;
    }
    .enter-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: white;
    }
    .mute-btn {
      position: absolute;
      bottom: 40px;
      left: 40px;
      z-index: 3;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: transparent;
      border: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
      padding: 10px;
      opacity: 0.7;
      filter: brightness(0) invert(1);
    }
    .mute-btn:hover {
      transform: scale(1.1);
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="intro-container">
    <video id="bgVideo" class="bg-video" loop playsinline>
      <source src="main_mv.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <div class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</div>
    <div class="enter-btn" onclick="enterMain()">ENTER</div>
  </div>

  <script>
    function enterMain() {
      // 클릭 시 메인 홈페이지(main.html)로 이동
      window.location.href = 'main.html'; 
    }

    const video = document.getElementById('bgVideo');
    const muteBtn = document.getElementById('muteBtn');

    // 시도: 기본값으로 소리 켜고 재생
    video.muted = false;
    let playPromise = video.play();

    if (playPromise !== undefined) {
      playPromise.then(() => {
        // 소리와 함께 재생 성공
        muteBtn.textContent = "🔊";
      }).catch((error) => {
        // 브라우저 정책으로 차단됨 -> 음소거로 변경해서라도 영상이 화면에 나오게끔 강제 재생
        video.muted = true;
        video.play();
        muteBtn.textContent = "🔇";
      });
    }

    function toggleMute() {
      if (video.muted) {
        video.muted = false;
        muteBtn.textContent = "🔊";
      } else {
        video.muted = true;
        muteBtn.textContent = "🔇";
      }
    }
  </script>

</body>
</html>
