<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로또 번호 추천기</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ffcc00;
      --primary-hover: #ffdd44;
      --bg-gradient-1: #0f2027;
      --bg-gradient-2: #203a43;
      --bg-gradient-3: #2c5364;
    }

    body {
      margin: 0;
      font-family: 'Outfit', 'Segoe UI', sans-serif;
      text-align: center;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), var(--bg-gradient-2));
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: white;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 50px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      max-width: 600px;
      width: 90%;
      position: relative;
      z-index: 10;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(to right, #fff, #ffcc00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 20px rgba(0,0,0,0.2);
      letter-spacing: 2px;
    }

    button {
      padding: 16px 40px;
      font-size: 1.1rem;
      font-family: 'Outfit', sans-serif;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), #ffa100);
      color: #1a1a1a;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 25px rgba(255, 204, 0, 0.5);
      background: linear-gradient(135deg, var(--primary-hover), #ffb300);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 5px 10px rgba(255, 204, 0, 0.3);
    }

    .set {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ball {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      font-size: 1.2rem;
      font-weight: 900;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
      box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), inset 5px 5px 15px rgba(255,255,255,0.4), 0 5px 10px rgba(0,0,0,0.3);
      opacity: 0;
      transform: scale(0) translateY(20px);
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      transition: transform 0.3s ease;
    }

    .ball:hover {
      transform: scale(1.15) translateY(-5px) !important;
      z-index: 10;
    }

    @keyframes popIn {
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* 로또 색상 규칙 (고급스러운 그라디언트 적용) */
    .yellow { background: radial-gradient(circle at 30% 30%, #fceabb, #f8b500); }
    .blue   { background: radial-gradient(circle at 30% 30%, #89f7fe, #66a6ff); }
    .red    { background: radial-gradient(circle at 30% 30%, #ff9a9e, #fecfef, #ff5e62); }
    .gray   { background: radial-gradient(circle at 30% 30%, #e0e0e0, #8f94fb); }
    .green  { background: radial-gradient(circle at 30% 30%, #d4fc79, #96e6a1); }

    /* 장식용 떠다니는 빛 구슬 */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
      animation: float 10s infinite ease-in-out alternate;
    }
    .orb-1 { width: 300px; height: 300px; background: rgba(255, 204, 0, 0.15); top: -100px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: rgba(102, 166, 255, 0.15); bottom: -150px; right: -100px; animation-delay: -5s; }

    @keyframes float {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <h1>🎯 로또 번호 추천기</h1>
    <button onclick="generateLotto()">5세트 생성</button>
    <div id="result"></div>
  </div>

  <script>
    function getColor(num) {
      if (num <= 10) return "yellow";
      if (num <= 20) return "blue";
      if (num <= 30) return "red";
      if (num <= 40) return "gray";
      return "green";
    }

    function generateOneSet() {
      let numbers = [];
      while (numbers.length < 6) {
        let num = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(num)) {
          numbers.push(num);
        }
      }
      return numbers.sort((a, b) => a - b);
    }

    function generateLotto() {
      const container = document.getElementById("result");
      container.innerHTML = "";

      for (let i = 0; i < 5; i++) {
        const setDiv = document.createElement("div");
        setDiv.className = "set";
        
        const numbers = generateOneSet();

        numbers.forEach((n, index) => {
          const ball = document.createElement("div");
          ball.className = "ball " + getColor(n);
          ball.textContent = n;
          
          // 애니메이션 딜레이 설정 (순차적으로 나타나게)
          const globalDelay = i * 0.15; // 세트간 딜레이
          const localDelay = index * 0.08; // 공 간 딜레이
          ball.style.animationDelay = `${globalDelay + localDelay}s`;
          
          setDiv.appendChild(ball);
        });

        container.appendChild(setDiv);
      }
    }
  </script>
</body>
</html>
